name: Deploy to Quick

on:
  push:
    branches: [main]
    paths:
      - 'site/**'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        uses: shopify-playground/deploy-to-quick@main
        with:
          dir: site
          site_name: shop-pay-gpv
